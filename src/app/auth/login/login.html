<section class="bg-slate-900 flex items-center justify-center min-h-screen">
  <div class="w-full max-w-md bg-slate-800 rounded-2xl shadow-2xl p-8 border border-slate-700">
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-white">Iniciar Sesión</h1>
      <p class="text-slate-400 mt-2">Ingresa tus credenciales</p>
    </div>

    <form class="space-y-5">
      <div>
        <label class="block text-sm font-medium text-slate-300 mb-2"> Nombre de Usuario </label>
        <input
          type="text"
          placeholder="correo@ejemplo.com"
          class="w-full px-4 py-3 bg-slate-700 text-slate-100 placeholder-slate-400 border border-slate-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-300 mb-2"> Contraseña </label>
        <input
          type="password"
          placeholder="••••••••"
          class="w-full px-4 py-3 bg-slate-700 text-slate-100 placeholder-slate-400 border border-slate-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500"
        />
      </div>

      <div class="flex items-center justify-between text-sm">
        <label class="flex items-center gap-2 text-slate-300">
          <input type="checkbox" />
          <span>Recordarme</span>
        </label>

        <a href="#" class="text-cyan-400 hover:text-cyan-300 hover:underline">
          ¿Olvidaste tu contraseña?
        </a>
      </div>

      <button
        routerLink="/dashboard-administrador"
        type="submit"
        class="w-full bg-cyan-600 text-white py-3 rounded-lg font-semibold hover:bg-cyan-700 transition"
      >
        Ingresar
      </button>
    </form>

    <p class="text-center text-sm text-slate-400 mt-6">
      ¿No tienes una cuenta?
      <a
        routerLink="/registrar-cliente"
        class="text-cyan-400 font-medium hover:text-cyan-300 hover:underline"
      >
        Regístrate
      </a>
    </p>
  </div>
</section>
