<section class="bg-slate-900 flex items-center justify-center min-h-screen py-10">
  <div class="w-full max-w-2xl bg-slate-800 rounded-2xl shadow-2xl p-8 border border-slate-700">
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-white">Crear Cuenta</h1>
      <p class="text-slate-400 mt-2">Completa tus datos para registrarte</p>
    </div>

    <form class="space-y-5">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-2"> Nombres </label>
          <input
            type="text"
            placeholder="Juan Carlos"
            class="w-full px-4 py-3 bg-slate-700 text-slate-100 placeholder-slate-400 border border-slate-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-cyan-500"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-300 mb-2"> Apellidos </label>
          <input
            type="text"
            placeholder="Pérez Gómez"
            class="w-full px-4 py-3 bg-slate-700 text-slate-100 placeholder-slate-400 border border-slate-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-cyan-500"
          />
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-2"> Tipo de Documento </label>
          <select
            class="w-full px-4 py-3 bg-slate-700 text-slate-100 border border-slate-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-cyan-500"
          >
            <option>DNI</option>
            <option>Pasaporte</option>
            <option>Carné de Extranjería</option>
          </select>
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-300 mb-2"> Número de Documento </label>
          <input
            type="text"
            placeholder="12345678"
            class="w-full px-4 py-3 bg-slate-700 text-slate-100 placeholder-slate-400 border border-slate-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-cyan-500"
          />
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-300 mb-2"> Correo Electrónico </label>
        <input
          type="email"
          placeholder="correo@ejemplo.com"
          class="w-full px-4 py-3 bg-slate-700 text-slate-100 placeholder-slate-400 border border-slate-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-cyan-500"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-300 mb-2"> Teléfono </label>
        <input
          type="tel"
          placeholder="999 999 999"
          class="w-full px-4 py-3 bg-slate-700 text-slate-100 placeholder-slate-400 border border-slate-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-cyan-500"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-300 mb-2"> Nombre de Usuario </label>
        <input
          type="text"
          placeholder="usuario123"
          class="w-full px-4 py-3 bg-slate-700 text-slate-100 placeholder-slate-400 border border-slate-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-cyan-500"
        />
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-2"> Contraseña </label>
          <input
            type="password"
            placeholder="••••••••"
            class="w-full px-4 py-3 bg-slate-700 text-slate-100 placeholder-slate-400 border border-slate-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-cyan-500"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-300 mb-2">
            Confirmar Contraseña
          </label>
          <input
            type="password"
            placeholder="••••••••"
            class="w-full px-4 py-3 bg-slate-700 text-slate-100 placeholder-slate-400 border border-slate-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-cyan-500"
          />
        </div>
      </div>

      <button
        type="submit"
        class="w-full bg-cyan-600 text-white py-3 rounded-lg font-semibold hover:bg-cyan-700 transition"
      >
        Registrarse
      </button>

      <p class="text-center text-sm text-slate-400">
        ¿Ya tienes una cuenta?
        <a href="#" class="text-cyan-400 hover:text-cyan-300"> Iniciar Sesión </a>
      </p>
    </form>
  </div>
</section>
