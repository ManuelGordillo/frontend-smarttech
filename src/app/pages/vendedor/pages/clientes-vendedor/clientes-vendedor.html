<div class="min-h-screen bg-white p-6">
  <!-- HEADER -->
  <div class="flex flex-col lg:flex-row justify-between items-start lg:items-center gap-4 mb-8">
    <div>
      <h1 class="text-3xl font-bold text-slate-900">Clientes</h1>
      <p class="text-slate-600 mt-1">Selecciona un cliente existente o registra uno nuevo.</p>
    </div>

    <button class="btn btn-outline">← Volver al Carrito</button>
  </div>

  <!-- TABS -->
  <div role="tablist" class="tabs tabs-bordered mb-6">
    <a role="tab" class="tab tab-active text-slate-900"> Clientes Existentes </a>
    <a role="tab" class="tab text-slate-600"> Nuevo Cliente </a>
  </div>

  <!-- CLIENTES EXISTENTES -->
  <div class="card bg-white shadow-xl border border-gray-200 mb-8">
    <div class="card-body">
      <h2 class="card-title text-slate-900">Buscar Cliente</h2>

      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <input
          type="text"
          placeholder="DNI"
          class="input input-bordered bg-white border-gray-300 text-slate-900 placeholder:text-slate-400 focus:border-primary focus:outline-none"
        />

        <input
          type="text"
          placeholder="Nombre o Apellido"
          class="input input-bordered bg-white border-gray-300 text-slate-900 placeholder:text-slate-400 focus:border-primary focus:outline-none"
        />

        <button class="btn btn-primary">Buscar</button>
      </div>
    </div>
  </div>

  <!-- TABLA CLIENTES -->
  <div class="card bg-white shadow-xl border border-gray-200">
    <div class="card-body">
      <h2 class="card-title text-slate-900 mb-4">Clientes Encontrados</h2>

      <div class="overflow-x-auto">
        <table class="table text-slate-900">
          <thead>
            <tr>
              <th class="text-slate-700 border-b-2 border-gray-200">DNI</th>
              <th class="text-slate-700 border-b-2 border-gray-200">Cliente</th>
              <th class="text-slate-700 border-b-2 border-gray-200">Teléfono</th>
              <th class="text-slate-700 border-b-2 border-gray-200">Correo</th>
              <th class="border-b-2 border-gray-200"></th>
            </tr>
          </thead>

          <tbody>
            <tr class="hover:bg-gray-50">
              <td class="text-slate-900">75896321</td>
              <td class="text-slate-900">Juan Pérez Gómez</td>
              <td class="text-slate-900">987654321</td>
              <td class="text-slate-900">juan@gmail.com</td>
              <td>
                <button class="btn btn-success btn-sm">Seleccionar</button>
              </td>
            </tr>

            <tr class="hover:bg-gray-50">
              <td class="text-slate-900">74589632</td>
              <td class="text-slate-900">María Torres Ruiz</td>
              <td class="text-slate-900">945632178</td>
              <td class="text-slate-900">maria@gmail.com</td>
              <td>
                <button class="btn btn-success btn-sm">Seleccionar</button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- NUEVO CLIENTE -->
  <div class="card bg-white shadow-xl border border-gray-200 mt-8">
    <div class="card-body">
      <h2 class="card-title text-slate-900">Registrar Nuevo Cliente</h2>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <input
          type="text"
          placeholder="DNI"
          class="input input-bordered bg-white border-gray-300 text-slate-900 placeholder:text-slate-400 focus:border-primary focus:outline-none"
        />

        <input
          type="text"
          placeholder="Nombres"
          class="input input-bordered bg-white border-gray-300 text-slate-900 placeholder:text-slate-400 focus:border-primary focus:outline-none"
        />

        <input
          type="text"
          placeholder="Apellidos"
          class="input input-bordered bg-white border-gray-300 text-slate-900 placeholder:text-slate-400 focus:border-primary focus:outline-none"
        />

        <input
          type="email"
          placeholder="Correo"
          class="input input-bordered bg-white border-gray-300 text-slate-900 placeholder:text-slate-400 focus:border-primary focus:outline-none"
        />

        <input
          type="text"
          placeholder="Teléfono"
          class="input input-bordered bg-white border-gray-300 text-slate-900 placeholder:text-slate-400 focus:border-primary focus:outline-none"
        />

        <input
          type="text"
          placeholder="Dirección"
          class="input input-bordered bg-white border-gray-300 text-slate-900 placeholder:text-slate-400 focus:border-primary focus:outline-none"
        />
      </div>

      <div class="flex justify-end mt-6 gap-3">
        <button class="btn btn-outline">Limpiar</button>
        <button class="btn btn-primary">Guardar Cliente</button>
      </div>
    </div>
  </div>
</div>
