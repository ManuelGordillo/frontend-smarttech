<div class="min-h-screen bg-white p-6">
  <!-- HEADER -->
  <smarttech-clientes-vendedor-header />

  <!-- BUSCAR CLIENTES -->
  <smarttech-buscar-clientes-vendedor (buscar)="onBuscar($event)" (limpiar)="onLimpiar()" />

  <!-- TABLA CLIENTES -->
  <smarttech-tabla-clientes-vendedor
    [clientes]="clientesFiltrados"
    [cargando]="cargando"
    (seleccionarCliente)="onSeleccionarCliente($event)"
  />

  <!-- NUEVO CLIENTE -->
  <smarttech-nuevo-clientes-vendedor (clienteCreado)="onClienteCreado()" />
</div>
