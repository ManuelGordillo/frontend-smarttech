<div class="min-h-screen bg-base-100 p-6">
  <!-- HEADER -->
  <div class="flex flex-col lg:flex-row justify-between items-start lg:items-center gap-4 mb-8">
    <div>
      <h1 class="text-3xl font-bold">Clientes</h1>

      <p class="text-base-content/70 mt-1">Selecciona un cliente existente o registra uno nuevo.</p>
    </div>

    <button class="btn btn-outline">← Volver al Carrito</button>
  </div>

  <!-- TABS -->
  <div role="tablist" class="tabs tabs-bordered mb-6">
    <a role="tab" class="tab tab-active"> Clientes Existentes </a>

    <a role="tab" class="tab"> Nuevo Cliente </a>
  </div>

  <!-- CLIENTES EXISTENTES -->
  <div class="card bg-base-100 shadow-xl border border-base-300 mb-8">
    <div class="card-body">
      <h2 class="card-title">Buscar Cliente</h2>

      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <input type="text" placeholder="DNI" class="input input-bordered" />

        <input type="text" placeholder="Nombre o Apellido" class="input input-bordered" />

        <button class="btn btn-primary">Buscar</button>
      </div>
    </div>
  </div>

  <!-- TABLA CLIENTES -->
  <div class="card bg-base-100 shadow-xl border border-base-300">
    <div class="card-body">
      <h2 class="card-title mb-4">Clientes Encontrados</h2>

      <div class="overflow-x-auto">
        <table class="table">
          <thead>
            <tr>
              <th>DNI</th>
              <th>Cliente</th>
              <th>Teléfono</th>
              <th>Correo</th>
              <th></th>
            </tr>
          </thead>

          <tbody>
            <tr>
              <td>75896321</td>

              <td>Juan Pérez Gómez</td>

              <td>987654321</td>

              <td>juan@gmail.com</td>

              <td>
                <button class="btn btn-success btn-sm">Seleccionar</button>
              </td>
            </tr>

            <tr>
              <td>74589632</td>

              <td>María Torres Ruiz</td>

              <td>945632178</td>

              <td>maria@gmail.com</td>

              <td>
                <button class="btn btn-success btn-sm">Seleccionar</button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- NUEVO CLIENTE -->
  <div class="card bg-base-100 shadow-xl border border-base-300 mt-8">
    <div class="card-body">
      <h2 class="card-title">Registrar Nuevo Cliente</h2>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <input type="text" placeholder="DNI" class="input input-bordered" />

        <input type="text" placeholder="Nombres" class="input input-bordered" />

        <input type="text" placeholder="Apellidos" class="input input-bordered" />

        <input type="email" placeholder="Correo" class="input input-bordered" />

        <input type="text" placeholder="Teléfono" class="input input-bordered" />

        <input type="text" placeholder="Dirección" class="input input-bordered" />
      </div>

      <div class="flex justify-end mt-6 gap-3">
        <button class="btn btn-outline">Limpiar</button>

        <button class="btn btn-primary">Guardar Cliente</button>
      </div>
    </div>
  </div>
</div>
