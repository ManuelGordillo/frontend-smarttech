<div class="min-h-screen bg-base-100 p-6">
  <!-- HEADER -->
  <div class="mb-8">
    <h1 class="text-3xl font-bold">Configuración</h1>

    <p class="text-base-content/70 mt-1">Administra tu perfil y preferencias.</p>
  </div>

  <div class="grid grid-cols-1 xl:grid-cols-3 gap-6">
    <!-- PERFIL -->
    <div class="card bg-base-100 shadow-xl border border-base-300">
      <div class="card-body">
        <h2 class="card-title">Mi Perfil</h2>

        <div class="flex flex-col items-center mt-4">
          <div class="avatar">
            <div class="w-24 rounded-full">
              <img src="https://i.pravatar.cc/150?img=12" />
            </div>
          </div>

          <div class="mt-4 text-center">
            <div class="font-bold text-lg">Juan Pérez</div>
            <div class="text-base-content/70">Vendedor</div>
          </div>
        </div>
      </div>
    </div>

    <!-- DATOS -->
    <div class="card bg-base-100 shadow-xl border border-base-300 xl:col-span-2">
      <div class="card-body">
        <h2 class="card-title">Datos Personales</h2>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4">
          <input type="text" class="input input-bordered" placeholder="Nombre" />

          <input type="text" class="input input-bordered" placeholder="Apellido" />

          <input type="email" class="input input-bordered" placeholder="Correo" />

          <input type="text" class="input input-bordered" placeholder="Teléfono" />
        </div>

        <div class="mt-6 flex justify-end">
          <button class="btn btn-primary">Guardar Cambios</button>
        </div>
      </div>
    </div>
  </div>

  <!-- SEGURIDAD -->
  <div class="card bg-base-100 shadow-xl border border-base-300 mt-6">
    <div class="card-body">
      <h2 class="card-title">Seguridad</h2>

      <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mt-4">
        <input type="password" class="input input-bordered" placeholder="Contraseña actual" />

        <input type="password" class="input input-bordered" placeholder="Nueva contraseña" />

        <input type="password" class="input input-bordered" placeholder="Confirmar contraseña" />
      </div>

      <div class="mt-6 flex justify-end">
        <button class="btn btn-warning">Actualizar Contraseña</button>
      </div>
    </div>
  </div>

  <!-- ACCIONES -->
  <div class="mt-6 flex justify-end">
    <button class="btn btn-error">Cerrar Sesión</button>
  </div>
</div>
