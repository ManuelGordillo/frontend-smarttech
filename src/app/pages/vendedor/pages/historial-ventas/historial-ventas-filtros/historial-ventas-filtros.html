<div class="card bg-white shadow-xl border border-white/50 rounded-2xl mb-8">
  <div class="card-body p-5 md:p-6">
    <h2 class="card-title text-slate-700 mb-3 text-xl">Filtros de Búsqueda</h2>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-4">
      <!-- Número de Venta -->
      <input
        type="text"
        placeholder="🔍 N° Venta"
        class="input input-bordered bg-white border-slate-200 focus:border-primary rounded-xl placeholder:text-slate-400"
        [(ngModel)]="filtros.numeroVenta"
      />

      <!-- Cliente -->
      <input
        type="text"
        placeholder="🔍 Cliente"
        class="input input-bordered bg-white border-slate-200 focus:border-primary rounded-xl placeholder:text-slate-400"
        [(ngModel)]="filtros.cliente"
      />

      <!-- Fecha -->
      <input
        type="date"
        class="input input-bordered bg-white border-slate-200 focus:border-primary rounded-xl text-slate-600"
        [(ngModel)]="filtros.fecha"
      />

      <!-- Buscar -->
      <button
        class="btn btn-primary rounded-xl shadow-lg shadow-primary/20 hover:shadow-primary/30 transition-all duration-200"
        (click)="buscarVentas()"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-5 w-5 mr-2"
          viewBox="0 0 20 20"
          fill="currentColor"
        >
          <path
            fill-rule="evenodd"
            d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z"
            clip-rule="evenodd"
          />
        </svg>
        Buscar
      </button>

      <!-- Limpiar -->
      <button
        class="btn btn-outline rounded-xl border-slate-300 hover:bg-slate-100 transition-all duration-200"
        (click)="limpiar()"
      >
        Limpiar
      </button>
    </div>
  </div>
</div>
