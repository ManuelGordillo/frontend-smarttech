<div class="min-h-screen bg-linear-to-br from-slate-50 to-blue-50/30 p-4 md:p-8">
  <!-- HEADER -->
  <div class="mb-8">
    <h1 class="text-4xl font-extrabold text-slate-800 tracking-tight">Historial de Ventas</h1>
    <p class="text-slate-500 mt-1 text-lg">Consulta y gestiona todas las ventas realizadas.</p>
  </div>

  <!-- FILTROS -->
  <smarttech-historial-ventas-filtros (buscar)="aplicarFiltros($event)" />

  <!-- RESUMEN -->
  <smarttech-historial-ventas-resumen [ventas]="ventasFiltradas" />

  <!-- TABLA -->
  <smarttech-historial-ventas-tabla [ventas]="ventasFiltradas" (verVenta)="onVerVenta($event)" />

  <!-- PAGINACIÓN -->
  <div class="flex justify-center items-center gap-4 mt-8">
    <button
      class="btn btn-sm bg-white border-slate-200 hover:bg-slate-50 disabled:opacity-50"
      (click)="paginaActual = paginaActual - 1"
      [disabled]="paginaActual === 1"
    >
      ◀ Anterior
    </button>

    <span class="text-sm text-slate-600"> Página {{ paginaActual }} de {{ totalPaginas }} </span>

    <button
      class="btn btn-sm bg-white border-slate-200 hover:bg-slate-50 disabled:opacity-50"
      (click)="paginaActual = paginaActual + 1"
      [disabled]="paginaActual === totalPaginas"
    >
      Siguiente ▶
    </button>
  </div>

  <!-- Carga -->
  @if (cargando) {
    <div class="text-center py-8">
      <span class="loading loading-spinner loading-lg text-primary"></span>
      <p class="text-slate-500 mt-2">Cargando ventas...</p>
    </div>
  }
</div>
