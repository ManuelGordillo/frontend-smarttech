<div class="min-h-screen bg-white p-6">
  <!-- HEADER -->
  <div class="mb-8">
    <h1 class="text-3xl font-bold text-gray-800">Historial de Ventas</h1>

    <p class="text-gray-500 mt-1">Consulta todas las ventas realizadas.</p>
  </div>

  <!-- FILTROS -->
  <div class="card bg-white shadow-md border border-gray-200 mb-8">
    <div class="card-body">
      <h2 class="card-title text-gray-700 mb-4">Filtros de Búsqueda</h2>

      <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
        <input type="text" placeholder="N° Venta" class="input input-bordered bg-white" />

        <input type="text" placeholder="Cliente" class="input input-bordered bg-white" />

        <input type="date" class="input input-bordered bg-white" />

        <button class="btn btn-primary">Buscar</button>
      </div>
    </div>
  </div>

  <!-- RESUMEN -->
  <div class="stats shadow-md w-full mb-8 bg-white border border-gray-200">
    <div class="stat">
      <div class="stat-title text-gray-500">Ventas Hoy</div>

      <div class="stat-value text-primary">15</div>
    </div>

    <div class="stat">
      <div class="stat-title text-gray-500">Ventas del Mes</div>

      <div class="stat-value text-secondary">120</div>
    </div>

    <div class="stat">
      <div class="stat-title text-gray-500">Total Vendido</div>

      <div class="stat-value text-success">S/ 48,500</div>
    </div>
  </div>

  <!-- TABLA -->
  <div class="card bg-white shadow-md border border-gray-200">
    <div class="card-body">
      <div class="flex justify-between items-center mb-4">
        <h2 class="card-title text-gray-700">Ventas Registradas</h2>

        <button class="btn btn-outline btn-primary">Exportar Excel</button>
      </div>

      <div class="overflow-x-auto">
        <table class="table table-zebra">
          <thead>
            <tr class="bg-gray-50">
              <th class="text-gray-600">N° Venta</th>
              <th class="text-gray-600">Fecha</th>
              <th class="text-gray-600">Cliente</th>
              <th class="text-gray-600">Comprobante</th>
              <th class="text-gray-600">Total</th>
              <th class="text-gray-600">Estado</th>
              <th class="text-gray-600">Acciones</th>
            </tr>
          </thead>

          <tbody>
            <tr>
              <td>#V0001</td>

              <td>19/06/2026</td>

              <td>Juan Pérez</td>

              <td>Boleta</td>

              <td class="font-semibold">S/ 3,499</td>

              <td>
                <span class="badge badge-success"> Completada </span>
              </td>

              <td>
                <div class="flex gap-2">
                  <button class="btn btn-info btn-sm">Ver</button>

                  <button class="btn btn-primary btn-sm">PDF</button>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- PAGINACIÓN -->
  <div class="flex justify-center mt-8">
    <div class="join">
      <button class="join-item btn bg-white border-gray-300">«</button>

      <button class="join-item btn btn-active bg-primary text-white border-primary">1</button>

      <button class="join-item btn bg-white border-gray-300">2</button>

      <button class="join-item btn bg-white border-gray-300">3</button>

      <button class="join-item btn bg-white border-gray-300">»</button>
    </div>
  </div>
</div>
