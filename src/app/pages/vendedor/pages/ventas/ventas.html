<div class="p-6 bg-white min-h-screen">
  <!-- ENCABEZADO -->
  <div class="flex flex-col lg:flex-row justify-between items-start lg:items-center gap-4 mb-8">
    <div>
      <h1 class="text-3xl font-bold text-gray-900">Ventas</h1>
      <p class="text-gray-600 mt-1">Busca productos y agrégalos al carrito.</p>
    </div>

    <!-- Botón Carrito con SVG -->
    <button class="btn btn-primary gap-2" routerLink="../carrito">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="h-5 w-5"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
        stroke-width="2"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-1.5 6h11l-1.5-6M7 13h10M7 13l-1 6h12l-1-6M7 13l-1.5 6h11l-1.5-6M7 13h10M7 13l-1 6h12l-1-6"
        />
      </svg>
      Carrito
      <!-- ✅ CAMBIO AQUÍ: Usar totalProductosCarrito() -->
      <div class="badge badge-secondary">{{ totalProductosCarrito() }}</div>
    </button>
  </div>

  <!-- FILTROS -->
  <smarttech-ventas-filtros (productosChange)="onProductosFiltrados($event)" />

  <!-- RESUMEN -->
  <smarttech-ventas-resumen [productos]="productosFiltrados()" [carrito]="carrito().productos" />

  <!-- PRODUCTOS usando CardProducto -->
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
    @for (producto of productosFiltrados(); track producto.id) {
      <smarttech-card-producto />
    } @empty {
      <div class="col-span-full text-center py-12">
        <div class="text-gray-400 text-6xl mb-4">📦</div>
        <h3 class="text-xl font-medium text-gray-600">No se encontraron productos</h3>
        <p class="text-gray-400">Intenta con otros filtros</p>
      </div>
    }
  </div>
</div>
