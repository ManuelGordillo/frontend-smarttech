<div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-6 mb-8">
  <div class="card bg-white shadow-lg border border-slate-200">
    <div class="card-body">
      <h2 class="card-title text-slate-600">Ventas Hoy</h2>
      <p class="text-4xl font-bold">S/ {{ ventasHoy | number: '1.2-2' }}</p>
      <div class="flex justify-between items-center mt-2">
        <span class="badge badge-success"> +12% </span>
        <span class="text-sm text-slate-500"> respecto a ayer </span>
      </div>
    </div>
  </div>

  <div class="card bg-white shadow-lg border border-slate-200">
    <div class="card-body">
      <h2 class="card-title text-slate-600">Ventas del Mes</h2>
      <p class="text-4xl font-bold">S/ {{ ventasMes | number: '1.2-2' }}</p>
      <div class="flex justify-between items-center mt-2">
        <span class="badge badge-success"> +18% </span>
        <span class="text-sm text-slate-500"> crecimiento mensual </span>
      </div>
    </div>
  </div>

  <div class="card bg-white shadow-lg border border-slate-200">
    <div class="card-body">
      <h2 class="card-title text-slate-600">Clientes</h2>
      <p class="text-4xl font-bold">{{ totalClientes }}</p>
      <div class="flex justify-between items-center mt-2">
        <span class="badge badge-info"> +35 </span>
        <span class="text-sm text-slate-500"> nuevos clientes </span>
      </div>
    </div>
  </div>

  <div class="card bg-white shadow-lg border border-slate-200">
    <div class="card-body">
      <h2 class="card-title text-slate-600">Productos</h2>
      <p class="text-4xl font-bold">{{ totalProductos }}</p>
      <div class="flex justify-between items-center mt-2">
        <span class="badge badge-warning"> 12 </span>
        <span class="text-sm text-slate-500"> stock bajo </span>
      </div>
    </div>
  </div>
</div>
