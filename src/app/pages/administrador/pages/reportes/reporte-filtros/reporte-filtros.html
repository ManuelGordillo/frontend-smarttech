<div class="bg-white rounded-xl shadow p-4 mb-6">
  <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">Fecha Inicio</label>
      <input
        type="date"
        [(ngModel)]="filtros.fechaInicio"
        class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
      />
    </div>

    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">Fecha Fin</label>
      <input
        type="date"
        [(ngModel)]="filtros.fechaFin"
        class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
      />
    </div>

    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">Marca</label>
      <input
        type="text"
        [(ngModel)]="filtros.marca"
        placeholder="Ej: Apple, Samsung"
        class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
      />
    </div>

    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">Modelo</label>
      <input
        type="text"
        [(ngModel)]="filtros.modelo"
        placeholder="Ej: iPhone 13, S24"
        class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
      />
    </div>
  </div>

  <div class="flex gap-2 mt-4">
    <button
      (click)="aplicarFiltros()"
      class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors"
    >
      Buscar
    </button>

    <button
      (click)="limpiarFiltros()"
      class="px-4 py-2 bg-slate-200 text-slate-700 rounded-lg hover:bg-slate-300 transition-colors"
    >
      Limpiar
    </button>
  </div>
</div>
