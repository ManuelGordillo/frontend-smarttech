<div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
  <!-- Total Productos -->
  <div class="bg-white rounded-xl shadow p-5 border-l-4 border-blue-500">
    <div class="flex items-center justify-between">
      <div>
        <p class="text-sm text-slate-500">Total Productos</p>
        <p class="text-2xl font-bold text-slate-900">{{ totalProductos }}</p>
      </div>
      <div class="text-3xl">📦</div>
    </div>
  </div>

  <!-- Stock Disponible -->
  <div class="bg-white rounded-xl shadow p-5 border-l-4 border-green-500">
    <div class="flex items-center justify-between">
      <div>
        <p class="text-sm text-slate-500">Stock Disponible</p>
        <p class="text-2xl font-bold text-green-600">{{ stockDisponible }}</p>
      </div>
      <div class="text-3xl">✅</div>
    </div>
  </div>

  <!-- Stock Bajo -->
  <div class="bg-white rounded-xl shadow p-5 border-l-4 border-yellow-500">
    <div class="flex items-center justify-between">
      <div>
        <p class="text-sm text-slate-500">Stock Bajo</p>
        <p class="text-2xl font-bold text-yellow-600">{{ stockBajo }}</p>
      </div>
      <div class="text-3xl">⚠️</div>
    </div>
  </div>

  <!-- Agotados -->
  <div class="bg-white rounded-xl shadow p-5 border-l-4 border-red-500">
    <div class="flex items-center justify-between">
      <div>
        <p class="text-sm text-slate-500">Agotados</p>
        <p class="text-2xl font-bold text-red-600">{{ agotados }}</p>
      </div>
      <div class="text-3xl">🚫</div>
    </div>
  </div>
</div>
