<div class="p-6">
  <div class="mb-6">
    <h1 class="text-3xl font-bold text-slate-900">Inventario</h1>
    <p class="text-slate-500">Gestión y control de stock</p>
  </div>

  <!-- Resumen -->
  <inventario-resumen
    [totalProductos]="totalProductos"
    [stockDisponible]="stockDisponible"
    [stockBajo]="stockBajo"
    [agotados]="agotados"
  />

  <!-- Filtros -->
  <inventario-filtros
    [marcas]="marcas"
    [colores]="colores"
    (filtrar)="onFiltrar($event)"
    (limpiar)="onLimpiarFiltros()"
  />

  <!-- Tabla -->
  <inventario-tabla [productos]="productosFiltrados" />
</div>
