<div class="bg-white rounded-xl shadow p-5 mb-6">
  <h2 class="text-lg font-semibold text-slate-900 mb-4">Filtros</h2>

  <div class="grid grid-cols-1 md:grid-cols-6 gap-4">
    <!-- Marca -->
    <select
      [(ngModel)]="filtros.marca"
      class="w-full px-4 py-2 border border-slate-300 rounded-lg bg-slate-50 text-slate-900 focus:outline-none focus:ring-2 focus:ring-blue-500"
    >
      <option value="">Todas las marcas</option>
      @for (marca of marcas; track marca) {
        <option [value]="marca">{{ marca }}</option>
      }
    </select>

    <!-- Modelo -->
    <input
      type="text"
      [(ngModel)]="filtros.modelo"
      placeholder="Buscar modelo..."
      class="w-full px-4 py-2 border border-slate-300 rounded-lg bg-slate-50 text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500"
    />

    <!-- ✅ Color -->
    <select
      [(ngModel)]="filtros.color"
      class="w-full px-4 py-2 border border-slate-300 rounded-lg bg-slate-50 text-slate-900 focus:outline-none focus:ring-2 focus:ring-blue-500"
    >
      <option value="">Todos los colores</option>
      @for (color of colores; track color) {
        <option [value]="color">
          <span class="inline-block w-3 h-3 rounded-full" [style.background]="color"></span>
          {{ color }}
        </option>
      }
    </select>

    <!-- Estado -->
    <select
      [(ngModel)]="filtros.estado"
      class="w-full px-4 py-2 border border-slate-300 rounded-lg bg-slate-50 text-slate-900 focus:outline-none focus:ring-2 focus:ring-blue-500"
    >
      @for (estado of estados; track estado) {
        <option [value]="estado">{{ estado }}</option>
      }
    </select>

    <!-- Fecha -->
    <input
      type="date"
      [(ngModel)]="filtros.fecha"
      class="w-full px-4 py-2 border border-slate-300 rounded-lg bg-slate-50 text-slate-900 focus:outline-none focus:ring-2 focus:ring-blue-500"
    />

    <!-- Botones -->
    <div class="flex gap-2">
      <button
        (click)="limpiarFiltros()"
        class="flex-1 px-4 py-2 bg-slate-200 hover:bg-slate-300 text-slate-700 rounded-lg transition font-medium"
      >
        Limpiar
      </button>
      <button
        (click)="aplicarFiltros()"
        class="flex-1 px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg transition font-medium"
      >
        Buscar
      </button>
    </div>
  </div>
</div>
