<div class="bg-white rounded-xl shadow p-5 mb-6">
  <h2 class="text-lg font-semibold text-slate-900 mb-4">Filtros de búsqueda</h2>

  <div class="grid grid-cols-1 md:grid-cols-5 gap-4">
    <input
      type="text"
      placeholder="Marca"
      class="input input-bordered w-full text-white"
      [(ngModel)]="filtros.marca"
    />

    <input
      type="text"
      placeholder="Modelo"
      class="input input-bordered w-full text-white"
      [(ngModel)]="filtros.modelo"
    />

    <input type="date" class="input input-bordered w-full text-white" [(ngModel)]="filtros.fecha" />

    <button class="btn btn-primary" (click)="buscarVentas()">Buscar</button>
    <button class="btn btn-warning" (click)="limpiar()">Limpiar</button>
  </div>
</div>
