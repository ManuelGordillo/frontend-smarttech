<div class="p-6">
  <div class="mb-6">
    <h1 class="text-3xl font-bold text-slate-900">Ventas</h1>

    <p class="text-slate-500">Historial y análisis de ventas</p>
  </div>

  <!-- Resumen -->
  <smarttech-ventas-resumen [ventas]="ventasFiltradas" />
  <!-- Filtros -->
  <smarttech-ventas-filtros (buscar)="aplicarFiltros($event)" />
  <!-- Tabla -->
  <smarttech-ventas-tabla [ventas]="ventasFiltradas" (verVenta)="onVerVenta($event)" />
</div>
