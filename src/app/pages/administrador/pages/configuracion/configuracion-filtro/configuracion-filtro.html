<div class="bg-white rounded-xl shadow p-5 mb-6">
  <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
    <select
      [(ngModel)]="filtros.rol"
      class="w-full px-3 py-2 border border-slate-300 rounded-lg bg-white text-slate-900 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
    >
      <option value="">Todos</option>
      <option value="ADMINISTRADOR">Administradores</option>
      <option value="VENDEDOR">Vendedores</option>
      <option value="CLIENTE">Clientes</option>
    </select>

    <input
      type="text"
      [(ngModel)]="filtros.busqueda"
      placeholder="Buscar usuario"
      class="w-full px-3 py-2 border border-slate-300 rounded-lg bg-white text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
    />

    <select
      [(ngModel)]="filtros.estado"
      class="w-full px-3 py-2 border border-slate-300 rounded-lg bg-white text-slate-900 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
    >
      <option value="">Todos</option>
      <option value="true">Activo</option>
      <option value="false">Inactivo</option>
    </select>

    <div class="flex gap-2">
      <button
        (click)="aplicarFiltros()"
        class="flex-1 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors"
      >
        Buscar
      </button>
      <button
        (click)="limpiarFiltros()"
        class="px-4 py-2 bg-slate-200 text-slate-700 rounded-lg hover:bg-slate-300 transition-colors"
      >
        Limpiar
      </button>
    </div>
  </div>
</div>
