<div id="nav" class="w-full px-6">
  <!-- bg-blue-800 -->

  @for (item of menuOpcionesCliente; track item.ruta) {
    @if (item.titulo === 'Cerrar sesión') {
      <!-- 🔥 Cerrar Sesión con click (mismos colores) -->
      <a
        (click)="CerrarSesionCliente()"
        class="w-full px-2 inline-flex space-x-2 items-center border-b border-slate-700 py-3 hover:bg-white/5 transition ease-linear duration-150 cursor-pointer"
      >
        <div>
          <i [class]="item.icono"></i>
        </div>
        <div class="flex flex-col">
          <span class="text-lg font-bold leading-5 text-white">{{ item.titulo }}</span>
          <span class="text-sm text-white/50 hidden md:block">{{ item.subtitulo }}</span>
        </div>
      </a>
    } @else {
      <!-- 🔥 Resto de opciones con routerLink -->
      <a
        [routerLink]="item.ruta"
        routerLinkActive="bg-blue-800"
        class="w-full px-2 inline-flex space-x-2 items-center border-b border-slate-700 py-3 hover:bg-white/5 transition ease-linear duration-150"
      >
        <div>
          <i [class]="item.icono"></i>
        </div>
        <div class="flex flex-col">
          <span class="text-lg font-bold leading-5 text-white">{{ item.titulo }}</span>
          <span class="text-sm text-white/50 hidden md:block">{{ item.subtitulo }}</span>
        </div>
      </a>
    }
  }
</div>
