<div class="bg-white shadow rounded-xl p-6 border border-slate-200">
  <h2 class="text-xl font-bold mb-4 text-slate-900">👤 Información del perfil</h2>

  @if (loading) {
    <div class="text-center py-8">
      <span class="loading loading-spinner loading-md text-primary"></span>
      <p class="text-slate-500 mt-2">Cargando perfil...</p>
    </div>
  } @else {
    <div class="flex items-center gap-4 mb-6">
      <div class="avatar">
        <div class="w-16 rounded-full ring-2 ring-primary ring-offset-2">
          <img src="https://via.placeholder.com/100" alt="Avatar" />
        </div>
      </div>
      <div>
        <p class="font-bold text-slate-900">{{ cliente.nombre || 'Cliente' }}</p>
        <p class="text-sm text-slate-500">Cliente activo</p>
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <input
        [(ngModel)]="cliente.nombre"
        class="w-full px-4 py-2 border-2 border-slate-300 rounded-lg bg-white text-slate-900 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200"
        placeholder="Nombres"
      />
      <input
        [(ngModel)]="cliente.apellido"
        class="w-full px-4 py-2 border-2 border-slate-300 rounded-lg bg-white text-slate-900 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200"
        placeholder="Apellidos"
      />
      <input
        [(ngModel)]="cliente.correo"
        class="w-full px-4 py-2 border-2 border-slate-300 rounded-lg bg-white text-slate-900 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200"
        placeholder="Correo electrónico"
      />
      <input
        [(ngModel)]="cliente.telefono"
        class="w-full px-4 py-2 border-2 border-slate-300 rounded-lg bg-white text-slate-900 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200"
        placeholder="Teléfono"
      />
      <input
        [(ngModel)]="cliente.dni"
        class="w-full px-4 py-2 border-2 border-slate-300 rounded-lg bg-white text-slate-900 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200 md:col-span-2"
        placeholder="Documento de identidad (DNI)"
      />
      <input
        [(ngModel)]="cliente.direccion"
        class="w-full px-4 py-2 border-2 border-slate-300 rounded-lg bg-white text-slate-900 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200 md:col-span-2"
        placeholder="Dirección"
      />
    </div>

    <button (click)="guardarCambios()" class="btn btn-primary mt-6" [disabled]="guardando">
      @if (guardando) {
        <span>Guardando...</span>
      } @else {
        <span>💾 Guardar cambios</span>
      }
    </button>
  }
</div>
