<div class="bg-white shadow rounded-xl p-6 border border-slate-200">
  <h2 class="text-xl font-bold mb-4 text-slate-900">🔐 Seguridad</h2>

  <div class="space-y-4">
    <input
      [(ngModel)]="contrasenaActual"
      class="w-full px-4 py-2 border-2 border-slate-300 rounded-lg bg-white text-slate-900 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200"
      type="password"
      placeholder="Contraseña actual"
    />
    <input
      [(ngModel)]="nuevaContrasena"
      class="w-full px-4 py-2 border-2 border-slate-300 rounded-lg bg-white text-slate-900 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200"
      type="password"
      placeholder="Nueva contraseña"
    />
    <input
      [(ngModel)]="confirmarContrasena"
      class="w-full px-4 py-2 border-2 border-slate-300 rounded-lg bg-white text-slate-900 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200"
      type="password"
      placeholder="Confirmar nueva contraseña"
    />
  </div>

  <button (click)="cambiarContrasena()" class="btn btn-warning mt-4" [disabled]="cambiando">
    @if (cambiando) {
      <span>Cambiando...</span>
    } @else {
      <span>🔑 Cambiar contraseña</span>
    }
  </button>
</div>
