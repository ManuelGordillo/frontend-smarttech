<div class="min-h-screen bg-slate-50 p-6">
  <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-6">
    <!-- IZQUIERDA: FORMULARIO DE PAGO -->
    <div class="lg:col-span-2 space-y-6">
      <h1 class="text-3xl font-bold">Checkout</h1>
      <p class="text-slate-500">Completa tu compra de forma segura</p>

      <!-- DIRECCIÓN -->
      <div class="bg-white p-6 rounded-xl shadow">
        <h2 class="font-bold text-lg mb-4">Dirección de envío</h2>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <input class="input input-bordered w-full" placeholder="Nombre completo" />
          <input class="input input-bordered w-full" placeholder="Teléfono" />
          <input class="input input-bordered w-full md:col-span-2" placeholder="Dirección" />
          <input class="input input-bordered w-full" placeholder="Ciudad" />
          <input class="input input-bordered w-full" placeholder="Distrito" />
        </div>
      </div>

      <!-- MÉTODO DE PAGO -->
      <div class="bg-white p-6 rounded-xl shadow">
        <h2 class="font-bold text-lg mb-4">Método de pago</h2>

        <div class="space-y-3">
          <label class="flex items-center gap-3 border p-3 rounded-lg cursor-pointer">
            <input type="radio" name="pago" class="radio radio-primary" checked />
            <span>💳 Tarjeta de crédito / débito</span>
          </label>

          <label class="flex items-center gap-3 border p-3 rounded-lg cursor-pointer">
            <input type="radio" name="pago" class="radio radio-primary" />
            <span>💵 Efectivo contra entrega</span>
          </label>

          <label class="flex items-center gap-3 border p-3 rounded-lg cursor-pointer">
            <input type="radio" name="pago" class="radio radio-primary" />
            <span>🏦 Transferencia bancaria</span>
          </label>

          <label class="flex items-center gap-3 border p-3 rounded-lg cursor-pointer">
            <input type="radio" name="pago" class="radio radio-primary" />
            <span>📱 Yape / Plin</span>
          </label>
        </div>
      </div>

      <!-- DATOS TARJETA (opcional UI) -->
      <div class="bg-white p-6 rounded-xl shadow">
        <h2 class="font-bold text-lg mb-4">Datos de tarjeta</h2>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <input
            class="input input-bordered w-full md:col-span-2"
            placeholder="Número de tarjeta"
          />
          <input class="input input-bordered w-full" placeholder="MM/AA" />
          <input class="input input-bordered w-full" placeholder="CVV" />
          <input
            class="input input-bordered w-full md:col-span-2"
            placeholder="Nombre en la tarjeta"
          />
        </div>
      </div>
    </div>

    <!-- DERECHA: RESUMEN -->
    <div class="space-y-6">
      <div class="bg-white p-6 rounded-xl shadow">
        <h2 class="font-bold text-lg mb-4">Resumen del pedido</h2>

        <!-- PRODUCTO -->
        <div class="space-y-3">
          <div class="flex justify-between text-sm">
            <span>iPhone 14 Pro x1</span>
            <span>S/ 4500</span>
          </div>

          <div class="flex justify-between text-sm">
            <span>Samsung S23 x2</span>
            <span>S/ 7600</span>
          </div>
        </div>

        <hr class="my-4" />

        <div class="flex justify-between font-bold text-lg">
          <span>Total</span>
          <span>S/ 12,100</span>
        </div>
      </div>

      <!-- BOTÓN CONFIRMAR -->
      <button class="btn btn-primary w-full">Confirmar compra</button>

      <button class="btn btn-outline w-full">Volver al carrito</button>
    </div>
  </div>
</div>
