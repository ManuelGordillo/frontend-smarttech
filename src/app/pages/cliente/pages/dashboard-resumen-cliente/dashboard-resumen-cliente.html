<div class="min-h-screen bg-slate-50 p-6">
  <div class="max-w-7xl mx-auto space-y-6">
    <!-- HEADER -->
    <div>
      <h1 class="text-3xl font-bold text-slate-900">Bienvenido, {{ nombreCliente }} 👋</h1>
      <p class="text-slate-500">Aquí tienes un resumen de tu actividad</p>
    </div>

    <!-- CARDS ESTADÍSTICAS CLIENTE -->
    <smarttech-estadisticas-cliente
      [totalCompras]="totalCompras"
      [totalGastado]="totalGastado"
      [pedidosPendientes]="pedidosPendientes"
      [productosCarrito]="productosCarrito"
    />

    <!-- SECCIÓN CENTRAL -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
      <!-- ÚLTIMA COMPRA -->
      <smarttech-ultima-compra [ultimaCompra]="ultimaCompra" />
      <!-- ACCESOS RÁPIDOS -->
      <smarttech-accesos-rapidos (navegar)="navegar($event)" />
    </div>

    <!-- PRODUCTOS RECOMENDADOS -->
    <div
      class="bg-white border border-slate-200 rounded-xl shadow-sm p-6 hover:shadow-md transition-shadow"
    >
      <h2 class="text-xl font-bold text-slate-900 mb-4">🌟 Recomendados para ti</h2>

      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        @for (producto of productosRecomendados; track producto.id) {
          <div class="border border-slate-200 rounded-lg p-4 hover:shadow-md transition-shadow">
            <h3 class="font-semibold text-slate-900">{{ producto.nombre }}</h3>
            <p class="text-sm text-slate-500">{{ producto.descripcion }}</p>
            <p class="font-bold text-slate-900 mt-2">S/ {{ producto.precio | number: '1.2-2' }}</p>
            <button
              class="w-full mt-3 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors text-sm font-medium"
            >
              Ver producto
            </button>
          </div>
        }
      </div>
    </div>
  </div>
</div>
