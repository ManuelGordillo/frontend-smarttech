<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
  <div class="bg-white border border-slate-200 rounded-xl shadow-sm p-5">
    <p class="text-slate-500 text-sm font-medium">Total de compras</p>
    <h2 class="text-3xl font-bold text-slate-900 mt-1">{{ totalCompras || 0 }}</h2>
  </div>

  <div class="bg-white border border-slate-200 rounded-xl shadow-sm p-5">
    <p class="text-slate-500 text-sm font-medium">Total gastado</p>
    <h2 class="text-3xl font-bold text-green-600 mt-1">S/ {{ totalGastado | number: '1.2-2' }}</h2>
  </div>

  <div class="bg-white border border-slate-200 rounded-xl shadow-sm p-5">
    <p class="text-slate-500 text-sm font-medium">Pedidos pendientes</p>
    <h2 class="text-3xl font-bold text-orange-500 mt-1">{{ pedidosPendientes || 0 }}</h2>
  </div>

  <div class="bg-white border border-slate-200 rounded-xl shadow-sm p-5">
    <p class="text-slate-500 text-sm font-medium">Productos en carrito</p>
    <h2 class="text-3xl font-bold text-blue-600 mt-1">{{ productosCarrito || 0 }}</h2>
  </div>
</div>
