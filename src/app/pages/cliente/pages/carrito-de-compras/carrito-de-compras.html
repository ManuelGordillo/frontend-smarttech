<!-- TOGGLE (controla apertura del carrito) -->
<input id="cart-drawer" type="checkbox" class="drawer-toggle" />

<div class="drawer drawer-end">
  <!-- CONTENIDO PRINCIPAL (no se toca mucho aquí) -->
  <div class="drawer-content">
    <!-- Botón flotante carrito -->
    <label for="cart-drawer" class="btn btn-primary fixed bottom-6 right-6 rounded-full shadow-lg">
      🛒 Carrito
    </label>
  </div>

  <!-- PANEL LATERAL -->
  <div class="drawer-side">
    <label for="cart-drawer" class="drawer-overlay"></label>

    <div class="w-96 bg-white h-full flex flex-col">
      <!-- HEADER -->
      <div class="p-4 border-b">
        <h2 class="text-xl font-bold">Tu carrito</h2>
        <p class="text-sm text-slate-500">Productos seleccionados</p>
      </div>

      <!-- LISTA DE PRODUCTOS -->
      <div class="flex-1 overflow-y-auto p-4 space-y-4">
        <!-- ITEM 1 -->
        <div class="flex gap-3 border rounded-lg p-3">
          <img src="https://via.placeholder.com/80" class="w-16 h-16 rounded object-cover" />

          <div class="flex-1">
            <h3 class="font-semibold text-sm">iPhone 14 Pro</h3>
            <p class="text-xs text-slate-500">S/ 4500</p>

            <!-- cantidad -->
            <div class="flex items-center gap-2 mt-2">
              <button class="btn btn-xs btn-outline">-</button>
              <span>1</span>
              <button class="btn btn-xs btn-outline">+</button>
            </div>
          </div>

          <button class="btn btn-xs btn-error">✕</button>
        </div>

        <!-- ITEM 2 -->
        <div class="flex gap-3 border rounded-lg p-3">
          <img src="https://via.placeholder.com/80" class="w-16 h-16 rounded object-cover" />

          <div class="flex-1">
            <h3 class="font-semibold text-sm">Samsung S23</h3>
            <p class="text-xs text-slate-500">S/ 3800</p>

            <div class="flex items-center gap-2 mt-2">
              <button class="btn btn-xs btn-outline">-</button>
              <span>2</span>
              <button class="btn btn-xs btn-outline">+</button>
            </div>
          </div>

          <button class="btn btn-xs btn-error">✕</button>
        </div>
      </div>

      <!-- FOOTER -->
      <div class="p-4 border-t space-y-3">
        <div class="flex justify-between font-bold">
          <span>Total:</span>
          <span>S/ 12,300</span>
        </div>

        <button class="btn btn-primary w-full">Proceder al pago</button>

        <button class="btn btn-outline w-full">Vaciar carrito</button>
      </div>
    </div>
  </div>
</div>
